name: Deploy to GitHub Pages

on:
  # main への push で自動デプロイ
  push:
    branches: [main]
  # Actions 画面から手動実行も可能に
  workflow_dispatch:

# GITHUB_TOKEN に Pages デプロイ権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は最新の1本だけに。進行中のデプロイはキャンセルしない
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 音声(MP3)は git に入れず Release audio-v1 に置いている(リポジトリ肥大化回避)。
      # デプロイ時にここで audio/ へ取り込み、Pages が同一オリジンの audio/mpeg で配信する。
      # これにより iOS Safari で再生可能になる(Release 直リンクは application/octet-stream で iOS が拒否)。
      - name: Fetch audio from Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p audio
          gh release download audio-v1 --repo "$GITHUB_REPOSITORY" --dir audio --pattern '*.mp3' --clobber
          echo "取り込んだ音声:" && ls -la audio

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # リポジトリ全体を静的サイトとして配信(ビルド工程なし)
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
