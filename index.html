<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>解像度FM</title>
<meta name="description" content="世界の解像度を上げる、あなたのためのパーソナルラジオ局">
<meta name="theme-color" content="#0F1220">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="frame">
  <header class="topbar">
    <div class="station">
      <span class="station-name">解像度FM</span>
      <span class="station-freq mono" id="freqLabel">87.5 MHz</span>
    </div>
    <div class="topbar-right">
      <span class="onair" id="onairLamp" aria-hidden="true"><i></i>ON AIR</span>
      <button class="iconbtn" id="btnSettings" aria-label="設定">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.6 1.6 0 0 0 .32 1.76l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.6 1.6 0 0 0-1.76-.32 1.6 1.6 0 0 0-.97 1.47V21a2 2 0 1 1-4 0v-.09a1.6 1.6 0 0 0-1.05-1.47 1.6 1.6 0 0 0-1.76.32l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.6 1.6 0 0 0 .32-1.76 1.6 1.6 0 0 0-1.47-.97H3a2 2 0 1 1 0-4h.09A1.6 1.6 0 0 0 4.56 9a1.6 1.6 0 0 0-.32-1.76l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.6 1.6 0 0 0 1.76.32H9a1.6 1.6 0 0 0 .97-1.47V3a2 2 0 1 1 4 0v.09a1.6 1.6 0 0 0 .97 1.47 1.6 1.6 0 0 0 1.76-.32l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.6 1.6 0 0 0-.32 1.76V9c.63.28 1.1.85 1.47.97H21a2 2 0 1 1 0 4h-.09a1.6 1.6 0 0 0-1.47.97z"/></svg>
      </button>
    </div>
  </header>
  <div class="dial" aria-hidden="true">
    <div class="dial-ticks" id="dialTicks"></div>
    <div class="dial-needle" id="dialNeedle"></div>
  </div>

  <main class="view" id="view" tabindex="-1"></main>

  <div class="miniplayer" id="miniPlayer" hidden>
    <button class="mp-btn" id="mpPrev" aria-label="ひとつ戻る">⏮</button>
    <button class="mp-btn mp-main" id="mpToggle" aria-label="再生/停止">▶</button>
    <button class="mp-btn" id="mpNext" aria-label="ひとつ進む">⏭</button>
    <button class="mp-title" id="mpTitle" aria-label="ラジオ画面を開く">…</button>
    <button class="mp-btn" id="mpSlower" aria-label="遅くする">◀</button>
    <span class="mono mp-rate" id="mpRate">×1</span>
    <button class="mp-btn" id="mpFaster" aria-label="速くする">▶</button>
  </div>

  <nav class="tabbar" aria-label="メイン">
    <button data-view="home" class="tab is-active"><span class="tab-icon">🏠</span><span>ホーム</span></button>
    <button data-view="suiri" class="tab"><span class="tab-icon">🔍</span><span>推理</span></button>
    <button data-view="lens" class="tab"><span class="tab-icon">🔭</span><span>レンズ</span></button>
    <button data-view="radio" class="tab"><span class="tab-icon">📻</span><span>ラジオ</span></button>
    <button data-view="zukan" class="tab"><span class="tab-icon">📖</span><span>図鑑</span></button>
  </nav>
</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
